# fly.toml — deploy with: fly launch (first time) or fly deploy (updates)
app = "translink-mcp"          # change this to your preferred app name
primary_region = "sea"         # Seattle — closest to Vancouver

[build]

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0     # scales to zero when idle (free tier friendly)

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
